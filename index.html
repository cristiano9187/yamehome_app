<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>YameHome - Générateur de Reçus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }

      /* --- CONFIGURATION POUR L'IMPRESSION (PC & MOBILE) --- */
      @media print {
        @page { margin: 0; size: A4; }
        html, body, #root, .min-h-screen { 
          background: white !important;
          margin: 0 !important;
          padding: 0 !important;
          height: auto !important;
          -webkit-print-color-adjust: exact !important; 
          print-color-adjust: exact !important;
        }
        .print\:hidden, .no-print, form, button { display: none !important; }
        div.w-full.md\:w-2\/3 {
          width: 100% !important;
          background: white !important;
          padding: 0 !important;
          margin: 0 !important;
          display: block !important;
          overflow: visible !important;
        }
        #receipt-content {
          display: block !important;
          position: relative !important;
          width: 210mm !important;
          min-height: 297mm !important;
          margin: 0 !important;
          padding: 10mm !important;
          box-shadow: none !important;
          border: none !important;
          transform: scale(1) !important;
        }
        [id^="vercel-"], .vercel-toolbar, #vercel-live-feedback, [class*="vercel"] { 
          display: none !important; 
          opacity: 0 !important;
        }
      }

      /* --- ADAPTATION VISUELLE ÉCRAN MOBILE --- */
      @media screen and (max-width: 768px) {
        #receipt-content {
          min-width: 210mm;
          transform: scale(0.38);
          transform-origin: top left;
          margin-bottom: -180mm;
        }
        .preview-container { overflow-x: auto !important; display: block !important; }
      }
    </style>

    <!-- RESTAURATION DE L'IMPORTMAP STABLE (AISTUDIOCDN) -->
    <script type="importmap">
    {
      "imports": {
        "react/": "https://aistudiocdn.com/react@^19.2.0/",
        "react": "https://aistudiocdn.com/react@^19.2.0",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
        "webworker": "https://aistudiocdn.com/webworker@^0.8.4"
      }
    }
    </script>
    
    <link rel="stylesheet" href="index.css">
  </head>
  <body class="bg-gray-100 text-gray-800">
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
  </body>
</html>
