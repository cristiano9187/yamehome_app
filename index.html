<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>YameHome - Générateur de Reçus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }

      /* --- CONFIGURATION POUR L'IMPRESSION (PC & MOBILE) --- */
      @media print {
        @page { 
          margin: 0; 
          size: A4; 
        }
        body { 
          margin: 0 !important;
          padding: 0 !important;
          -webkit-print-color-adjust: exact !important; 
          print-color-adjust: exact !important;
        }
        /* Force le reçu à se caler en haut à gauche pour éviter de couper le texte */
        #receipt-content {
          position: absolute !important;
          left: 0 !important;
          top: 0 !important;
          width: 210mm !important;
          margin: 0 !important;
          padding: 10mm !important; /* On garde une marge interne propre */
          box-shadow: none !important;
          border: none !important;
        }
        /* Cache les éléments parasites */
        .no-print, .print\:hidden { display: none !important; }
      }

      /* --- ADAPTATION VISUELLE POUR L'ÉCRAN MOBILE --- */
      @media (max-width: 768px) {
        #receipt-content {
          min-width: 210mm; /* On garde la largeur A4 */
          transform: scale(0.35); /* On réduit l'échelle pour que ça tienne sur l'écran du tel */
          transform-origin: top left;
          margin-bottom: -180mm; /* Compense le vide créé par la réduction d'échelle */
        }
        /* Permet de scroller si besoin sur le téléphone */
        .preview-container {
          overflow-x: auto !important;
          display: block !important;
          -webkit-overflow-scrolling: touch;
        }
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://aistudiocdn.com/react@^19.2.0/",
        "react": "https://aistudiocdn.com/react@^19.2.0",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
        "webworker": "https://aistudiocdn.com/webworker@^0.8.4"
      }
    }
    </script>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body class="bg-gray-100 text-gray-800">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
