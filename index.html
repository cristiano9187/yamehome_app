<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>YameHome - Générateur de Reçus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }

      /* --- CONFIGURATION POUR L'IMPRESSION (PC & MOBILE) --- */
      @media print {
        @page { 
          margin: 0; 
          size: A4; 
        }
        
        /* On force le fond en blanc pur partout */
        html, body { 
          background: white !important;
          margin: 0 !important;
          padding: 0 !important;
          -webkit-print-color-adjust: exact !important; 
          print-color-adjust: exact !important;
        }

        /* ON CACHE TOTALEMENT LE FORMULAIRE SOMBRE (Le responsable du rectangle noir) */
        /* On cible les classes Tailwind génériques pour être sûr de ne rien rater */
        .print\:hidden, 
        .no-print, 
        div[class*="bg-gray-900"], 
        aside, 
        form { 
          display: none !important; 
          opacity: 0 !important;
          visibility: hidden !important;
        }

        /* On réinitialise le conteneur principal de l'aperçu */
        div[class*="bg-gray-200"] {
          background: white !important;
          padding: 0 !important;
          margin: 0 !important;
          display: block !important;
          width: 100% !important;
          height: auto !important;
        }

        /* Le reçu lui-même : on le plaque proprement */
        #receipt-content {
          position: static !important;
          width: 210mm !important;
          min-height: 297mm !important;
          margin: 0 !important;
          padding: 10mm !important;
          box-shadow: none !important;
          border: none !important;
          transform: scale(1) !important; /* On s'assure que l'échelle est réelle à l'impression */
        }
      }

      /* --- ADAPTATION VISUELLE POUR L'ÉCRAN MOBILE (HORS IMPRESSION) --- */
      @media screen and (max-width: 768px) {
        #receipt-content {
          min-width: 210mm;
          transform: scale(0.38); /* Légèrement agrandi pour lisibilité sur écran */
          transform-origin: top left;
          margin-bottom: -180mm;
        }
        .preview-container {
          overflow-x: auto !important;
          display: block !important;
          -webkit-overflow-scrolling: touch;
        }
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://aistudiocdn.com/react@^19.2.0/",
        "react": "https://aistudiocdn.com/react@^19.2.0",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
        "webworker": "https://aistudiocdn.com/webworker@^0.8.4"
      }
    }
    </script>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body class="bg-gray-100 text-gray-800">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
